name: Metrics

on:
  workflow_dispatch:

  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: github-profile-metrics
  cancel-in-progress: false

jobs:
  profile-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      PROFILE_USER: MichalPlanetaDev
      PROFILE_TOKEN: ${{ secrets.METRICS_TOKEN }}
      PERSONALITY_URL: ${{ secrets.SIXTEEN_PERSONALITIES_URL }}

    steps:
      - name: Generate compact GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg

          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ github.token }}
          committer_branch: main
          committer_message: "Update GitHub metrics [skip ci]"
          output_action: commit

          user: MichalPlanetaDev
          template: classic

          base: header, metadata
          base_hireable: yes
          base_skip: no

          config_display: columns
          config_octicon: yes
          config_presets: "@tokyonight"
          config_timezone: Europe/Warsaw
          config_twemoji: yes

          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_other: yes
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_repositories: yes
          plugin_repositories_featured: tickline, anticheat-portfolio, rust-security-sandbox, afterlight
          plugin_repositories_order: featured, pinned, starred, random
          plugin_repositories_pinned: 0

          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: ${{ secrets.SPOTIFY_TOKENS }}
          plugin_music_limit: 3
          plugin_music_played_at: yes

          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561198302989920"
          plugin_steam_sections: player, recently-played, most-played
          plugin_steam_games_limit: 2
          plugin_steam_recent_games_limit: 2
          plugin_steam_achievements_limit: 0
          plugin_steam_playtime_threshold: 1

      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Synchronize generated metrics
        run: git pull --rebase origin main

      - name: Generate compact supplemental metrics
        run: python3 scripts/generate_compact_metrics.py

      - name: Validate supplemental metrics
        shell: bash
        run: |
          set -Eeuo pipefail

          test -s supplemental-metrics.svg
          grep -q '<svg' supplemental-metrics.svg
          grep -q '</svg>' supplemental-metrics.svg

      - name: Commit supplemental metrics
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add supplemental-metrics.svg

          if git diff --cached --quiet
          then
            echo "[PASS] Supplemental metrics already current"
            exit 0
          fi

          git commit -m "Update supplemental metrics [skip ci]"
          git push origin main
