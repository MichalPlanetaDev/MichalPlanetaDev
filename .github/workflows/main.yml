name: Metrics

on:
  workflow_dispatch:

  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: github-profile-metrics
  cancel-in-progress: false

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PROFILE_USER: MichalPlanetaDev
      PROFILE_TOKEN: ${{ secrets.METRICS_TOKEN }}

    steps:
      - name: Generate the original compact Metrics card
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ github.token }}
          committer_branch: main
          committer_message: "Update GitHub metrics [skip ci]"
          output_action: commit

          user: MichalPlanetaDev
          template: classic

          base: header, metadata
          base_hireable: yes
          base_skip: no

          config_display: columns
          config_octicon: yes
          config_timezone: Europe/Warsaw
          config_twemoji: yes

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_other: yes
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: ${{ secrets.SPOTIFY_TOKENS }}
          plugin_music_limit: 3
          plugin_music_played_at: yes

          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561198302989920"
          plugin_steam_sections: player, recently-played
          plugin_steam_games_limit: 1
          plugin_steam_recent_games_limit: 1
          plugin_steam_achievements_limit: 0
          plugin_steam_playtime_threshold: 1

      - name: Check out the generated card
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Synchronize the Metrics commit
        run: git pull --rebase origin main

      - name: Restore the two compact sections and personality
        run: python3 scripts/patch_metrics_card.py

      - name: Verify the final card
        shell: bash
        run: |
          set -Eeuo pipefail

          test -s github-metrics.svg
          grep -q '<svg' github-metrics.svg
          grep -q 'Recent coding habits' github-metrics.svg
          grep -q 'Achievements' github-metrics.svg
          grep -q 'Personality' github-metrics.svg

          if grep -q 'Unexpected error' github-metrics.svg; then
            echo '[FAIL] The final SVG still contains Unexpected error'
            exit 1
          fi

      - name: Commit the repaired single-card SVG
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg

          if git diff --cached --quiet; then
            echo '[PASS] The compact SVG is already current'
            exit 0
          fi

          git commit -m "Repair compact profile metrics [skip ci]"
          git push origin main
