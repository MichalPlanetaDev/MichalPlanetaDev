name: Metrics

on:
  schedule:
    - cron: "17 4 * * *"
      timezone: "Europe/Warsaw"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub profile metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          user: MichalPlanetaDev
          template: classic

          base: header, metadata
          base_hireable: yes
          base_skip: no

          config_display: columns
          config_octicon: yes
          config_presets: "@tokyonight"
          config_timezone: Europe/Warsaw
          config_twemoji: yes

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_other: yes
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

          plugin_music: yes
          plugin_music_limit: 3
          plugin_music_mode: playlist
          plugin_music_playlist: https://open.spotify.com/embed/playlist/5kLKbb3dliavPkOzEim9za

          plugin_repositories: yes
          plugin_repositories_featured: tickline, rust-security-sandbox, anticheat-portfolio
          plugin_repositories_order: featured, pinned, starred, random
