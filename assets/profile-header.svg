<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Michał Płaneta — Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040711"/>
      <stop offset="44%" stop-color="#11152b"/>
      <stop offset="100%" stop-color="#04202a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="48%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="orbA">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#9fb4c8" stroke-width="1" stroke-opacity="0.07"/>
    </pattern>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <circle cx="1050" cy="40" r="300" fill="url(#orbB)" filter="url(#blur)"/>
  <circle cx="80" cy="330" r="300" fill="url(#orbA)" filter="url(#blur)"/>

  <g opacity="0.65" stroke="url(#line)" fill="none">
    <path d="M760 76 L860 76 L895 111 L1040 111" stroke-width="2"/>
    <path d="M810 248 L930 248 L968 210 L1120 210" stroke-width="2"/>
    <path d="M725 286 L820 286 L852 318 L1080 318" stroke-width="2"/>
  </g>

  <g fill="#07101f" stroke="#38bdf8" stroke-opacity="0.55">
    <circle cx="760" cy="76" r="6"/>
    <circle cx="1040" cy="111" r="6"/>
    <circle cx="810" cy="248" r="6"/>
    <circle cx="1120" cy="210" r="6"/>
    <circle cx="725" cy="286" r="6"/>
    <circle cx="1080" cy="318" r="6"/>
  </g>

  <text x="72" y="92" fill="#73e2ff" font-size="18" font-family="JetBrains Mono, Consolas, monospace" letter-spacing="2.2">MICHAŁ@ENGINEERING:~$ WHOAMI</text>
  <text x="68" y="176" fill="#f8fafc" font-size="62" font-weight="750" font-family="Segoe UI, Inter, Arial, sans-serif">Michał Płaneta</text>
  <text x="72" y="218" fill="#c8d7ea" font-size="21" font-family="Segoe UI, Inter, Arial, sans-serif" letter-spacing="1.25">SOFTWARE SYSTEMS · GAME TECHNOLOGY</text>
  <text x="72" y="249" fill="#9fb4c8" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" letter-spacing="1.5">SECURITY ENGINEERING · DEVOPS · GRAPHICS</text>

  <rect x="72" y="278" width="620" height="2" rx="1" fill="url(#line)"/>
  <text x="72" y="320" fill="#8fa8bf" font-size="17" font-family="JetBrains Mono, Consolas, monospace">build / verify / document / ship / improve</text>

  <g transform="translate(905 145)">
    <rect x="0" y="0" width="218" height="92" rx="14" fill="#050914" fill-opacity="0.78" stroke="#8b5cf6" stroke-opacity="0.55"/>
    <circle cx="22" cy="22" r="5" fill="#f87171"/>
    <circle cx="39" cy="22" r="5" fill="#fbbf24"/>
    <circle cx="56" cy="22" r="5" fill="#34d399"/>
    <text x="20" y="52" fill="#9fb4c8" font-size="13" font-family="JetBrains Mono, Consolas, monospace">$ ./quality-gate</text>
    <text x="20" y="75" fill="#5eead4" font-size="13" font-family="JetBrains Mono, Consolas, monospace">status: passing</text>
  </g>
</svg>