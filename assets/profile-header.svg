<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Michał Płaneta — multidisciplinary software engineer</title>
  <desc id="desc">A dark technical profile banner with an orbital systems motif and terminal-inspired typography.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d18"/>
      <stop offset="0.55" stop-color="#0d1524"/>
      <stop offset="1" stop-color="#101b2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ee787"/>
      <stop offset="0.52" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".34"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#8b949e" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="22" fill="url(#background)"/>
  <rect width="1200" height="360" rx="22" fill="url(#grid)"/>
  <rect x="0" y="0" width="10" height="360" rx="5" fill="url(#accent)"/>
  <path d="M44 48H680" stroke="url(#accent)" stroke-width="2" opacity=".75"/>
  <circle cx="974" cy="177" r="172" fill="url(#glow)"/>

  <g fill="none" stroke-linecap="round">
    <ellipse cx="974" cy="177" rx="172" ry="68" transform="rotate(-18 974 177)" stroke="#58a6ff" stroke-opacity=".33" stroke-width="2"/>
    <ellipse cx="974" cy="177" rx="135" ry="135" transform="rotate(24 974 177)" stroke="#7ee787" stroke-opacity=".22" stroke-width="2"/>
    <ellipse cx="974" cy="177" rx="95" ry="158" transform="rotate(65 974 177)" stroke="#bc8cff" stroke-opacity=".22" stroke-width="2"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="1064" cy="93" r="8" fill="#7ee787"/>
    <circle cx="842" cy="193" r="7" fill="#58a6ff"/>
    <circle cx="1026" cy="301" r="7" fill="#bc8cff"/>
  </g>
  <g>
    <circle cx="1064" cy="93" r="4" fill="#e6edf3"/>
    <circle cx="842" cy="193" r="4" fill="#e6edf3"/>
    <circle cx="1026" cy="301" r="4" fill="#e6edf3"/>
    <circle cx="974" cy="177" r="24" fill="#0d1117" stroke="#7ee787" stroke-width="2"/>
    <path d="M963 177h22M974 166v22" stroke="#7ee787" stroke-width="2"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="54" y="91" fill="#8b949e" font-size="17" letter-spacing="4">ENGINEERING PROFILE / SYSTEM MAP</text>
    <text x="52" y="157" fill="#f0f6fc" font-size="52" font-weight="750">MICHAŁ PŁANETA</text>
    <text x="54" y="202" fill="#7ee787" font-size="23" font-weight="650" letter-spacing="1.2">MULTIDISCIPLINARY SOFTWARE ENGINEER</text>
    <text x="54" y="244" fill="#c9d1d9" font-size="18">Game systems · C++ · Security-oriented engineering</text>
    <text x="54" y="274" fill="#c9d1d9" font-size="18">Automation · Infrastructure · Hardware–software integration</text>

    <rect x="54" y="305" width="498" height="30" rx="8" fill="#0d1117" stroke="#30363d"/>
    <circle cx="74" cy="320" r="4" fill="#7ee787"/>
    <text x="89" y="326" fill="#8b949e" font-size="14" font-family="JetBrains Mono, Consolas, monospace">build → verify → iterate → understand the whole system</text>
  </g>
</svg>
