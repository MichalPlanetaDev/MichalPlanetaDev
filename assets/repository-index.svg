<svg xmlns="http://www.w3.org/2000/svg" width="820" height="190" viewBox="0 0 820 190" role="img" aria-labelledby="title desc">
  <title id="title">Repository index</title>
  <desc id="desc">A dark repository navigation card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111c2b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="818" height="188" rx="15" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <path d="M0 0H820" stroke="url(#line)" stroke-width="6"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="34" y="52" fill="#8b949e" font-size="14" letter-spacing="3">PROJECT NAVIGATION</text>
