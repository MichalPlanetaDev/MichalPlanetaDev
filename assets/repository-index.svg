  </g>
  <g transform="translate(660 42)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="112" height="92" rx="12" stroke="#30363d" stroke-width="2"/>
    <circle cx="27" cy="30" r="8" stroke="#58a6ff" stroke-width="3"/>
    <circle cx="82" cy="30" r="8" stroke="#7ee787" stroke-width="3"/>
    <circle cx="55" cy="66" r="8" stroke="#bc8cff" stroke-width="3"/>
    <path d="M35 34l14 24M74 35L61 58" stroke="#8b949e" stroke-width="2"/>
