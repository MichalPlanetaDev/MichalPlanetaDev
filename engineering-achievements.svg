<svg
      xmlns="http://www.w3.org/2000/svg"
      width="100%"
      height="250"
      viewBox="0 0 900 250"
      role="img"
    >
      <style>
        :root {
          --background: #0d1117;
          --panel: #161b22;
          --border: #30363d;
          --primary: #f0f6fc;
          --secondary: #8b949e;
        }

        @media (prefers-color-scheme: light) {
          :root {
            --background: #ffffff;
            --panel: #f6f8fa;
            --border: #d0d7de;
            --primary: #1f2328;
            --secondary: #59636e;
          }
        }

        text {
          font-family:
            -apple-system,
            BlinkMacSystemFont,
            "Segoe UI",
            Helvetica,
            Arial,
            sans-serif;
        }

        .background {
          fill: var(--background);
          stroke: var(--border);
        }

        .box {
          fill: var(--panel);
          stroke: var(--border);
        }

        .title {
          fill: var(--primary);
          font-size: 24px;
          font-weight: 700;
        }

        .subtitle,
        .label,
        .detail,
        .footer {
          fill: var(--secondary);
        }

        .subtitle {
          font-size: 14px;
        }

        .label {
          font-size: 12px;
          font-weight: 600;
        }

        .value {
          fill: var(--primary);
          font-size: 23px;
          font-weight: 700;
        }

        .detail,
        .footer {
          font-size: 11px;
        }
      </style>

      <rect
        class="background"
        x="0.5"
        y="0.5"
        width="899"
        height="249"
        rx="13"
      />

      <rect
        x="24"
        y="23"
        width="5"
        height="48"
        rx="2.5"
        fill="#f85149"
      />

      <text
        class="title"
        x="43"
        y="44"
      >Engineering achievements</text>

      <text
        class="subtitle"
        x="43"
        y="68"
      >Repository-level results calculated from owned public projects</text>

      
            <g transform="translate(24.00,100)">
              <rect
                class="box"
                width="160.80"
                height="92"
                rx="10"
              />

              <text
                class="label"
                x="14"
                y="24"
              >Public repos</text>

              <text
                class="value"
                x="14"
                y="56"
              >7</text>

              <text
                class="detail"
                x="14"
                y="78"
              >visible projects</text>
            </g>
            
            <g transform="translate(196.80,100)">
              <rect
                class="box"
                width="160.80"
                height="92"
                rx="10"
              />

              <text
                class="label"
                x="14"
                y="24"
              >Stars earned</text>

              <text
                class="value"
                x="14"
                y="56"
              >4</text>

              <text
                class="detail"
                x="14"
                y="78"
              >across repositories</text>
            </g>
            
            <g transform="translate(369.60,100)">
              <rect
                class="box"
                width="160.80"
                height="92"
                rx="10"
              />

              <text
                class="label"
                x="14"
                y="24"
              >Repository forks</text>

              <text
                class="value"
                x="14"
                y="56"
              >0</text>

              <text
                class="detail"
                x="14"
                y="78"
              >external reuse</text>
            </g>
            
            <g transform="translate(542.40,100)">
              <rect
                class="box"
                width="160.80"
                height="92"
                rx="10"
              />

              <text
                class="label"
                x="14"
                y="24"
              >Followers</text>

              <text
                class="value"
                x="14"
                y="56"
              >6</text>

              <text
                class="detail"
                x="14"
                y="78"
              >GitHub audience</text>
            </g>
            
            <g transform="translate(715.20,100)">
              <rect
                class="box"
                width="160.80"
                height="92"
                rx="10"
              />

              <text
                class="label"
                x="14"
                y="24"
              >Languages</text>

              <text
                class="value"
                x="14"
                y="56"
              >3</text>

              <text
                class="detail"
                x="14"
                y="78"
              >primary languages</text>
            </g>
            

      <text
        class="footer"
        x="24"
        y="225"
      >Independent replacement for the unstable Metrics achievements plugin.</text>
    </svg>
    